<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eid Poster Maker</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f4f4f4; padding: 20px; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        canvas { max-width: 100%; height: auto; border: 1px solid #ccc; border-radius: 10px; cursor: move; touch-action: none; }
        .controls { display: flex; flex-direction: column; gap: 15px; margin-top: 20px; text-align: left; }
        input, button { padding: 12px; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; }
        button { background: #d81b60; color: white; border: none; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <canvas id="posterCanvas" width="800" height="1100"></canvas>
    <div class="controls">
        <label>1. ഫോട്ടോ തിരഞ്ഞെടുക്കുക:</label>
        <input type="file" id="imageInput" accept="image/*">
        
        <label>2. ഫോട്ടോ വലുപ്പം അഡ്ജസ്റ്റ് ചെയ്യുക:</label>
        <input type="range" id="zoomInput" min="0.1" max="2" step="0.01" value="0.6">

        <label>3. പേര് നൽകുക:</label>
        <input type="text" id="nameInput" placeholder="പേര് ഇവിടെ എഴുതുക...">
        
        <button onclick="downloadPoster()">പോസ്റ്റർ സേവ് ചെയ്യുക</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('posterCanvas');
    const ctx = canvas.getContext('2d');
    const imgInput = document.getElementById('imageInput');
    const nameInput = document.getElementById('nameInput');
    const zoomInput = document.getElementById('zoomInput');

    let baseImage = new Image();
    baseImage.src = 'poster-bg.png'; 

    let userImg = new Image();
    let imgLoaded = false;
    
    let imgX = 515, imgY = 350; 
    let scale = 0.6;
    let isDragging = false;
    let startX, startY;
    let initialDistance = null; // Pinch സൂമിന് വേണ്ടി

    const boxW = 270, boxH = 355, r = 45;

    baseImage.onload = () => draw();

    imgInput.onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (event) => {
            userImg.onload = () => {
                imgLoaded = true;
                draw();
            };
            userImg.src = event.target.result;
        };
        reader.readAsDataURL(e.target.files[0]);
    };

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(baseImage, 0, 0, canvas.width, canvas.height);

        if (imgLoaded) {
            ctx.save();
            ctx.beginPath();
            ctx.moveTo(imgX + r, imgY);
            ctx.arcTo(imgX + boxW, imgY, imgX + boxW, imgY + boxH, r);
            ctx.arcTo(imgX + boxW, imgY + boxH, imgX, imgY + boxH, r);
            ctx.arcTo(imgX, imgY + boxH, imgX, imgY, r);
            ctx.arcTo(imgX, imgY, imgX + boxW, imgY, r);
            ctx.closePath();
            
            ctx.fillStyle = "white";
            ctx.fill();
            
            ctx.lineWidth = 2;
            ctx.strokeStyle = "#eee";
            ctx.stroke();

            ctx.clip(); 

            let w = userImg.width * scale;
            let h = userImg.height * scale;
            ctx.drawImage(userImg, imgX + (boxW - w) / 2, imgY + (boxH - h) / 2, w, h);
            ctx.restore();
        }

        const name = nameInput.value;
        if (name) {
            ctx.font = "bold 35px sans-serif";
            ctx.fillStyle = "#FFFFFF";
            ctx.textAlign = "center";
            ctx.fillText(name, imgX + (boxW / 2), imgY + boxH + 45);
        }
    }

    function handleStart(x, y) {
        isDragging = true;
        startX = x; startY = y;
    }

    function handleMove(x, y) {
        if (!isDragging || !imgLoaded) return;
        imgX += (x - startX);
        imgY += (y - startY);
        startX = x; startY = y;
        draw();
    }

    // മൗസ് ഇവന്റുകൾ
    canvas.onmousedown = (e) => {
        const rect = canvas.getBoundingClientRect();
        handleStart((e.clientX - rect.left) * (canvas.width / rect.width), (e.clientY - rect.top) * (canvas.height / rect.height));
    };

    canvas.onmousemove = (e) => {
        const rect = canvas.getBoundingClientRect();
        handleMove((e.clientX - rect.left) * (canvas.width / rect.width), (e.clientY - rect.top) * (canvas.height / rect.height));
    };

    window.onmouseup = () => isDragging = false;

    // ടച്ച് ഇവന്റുകൾ (പിഞ്ച് സൂം ഉൾപ്പെടെ)
    canvas.ontouchstart = (e) => {
        const rect = canvas.getBoundingClientRect();
        if (e.touches.length === 1) {
            const t = e.touches[0];
            handleStart((t.clientX - rect.left) * (canvas.width / rect.width), (t.clientY - rect.top) * (canvas.height / rect.height));
        } else if (e.touches.length === 2) {
            initialDistance = Math.hypot(
                e.touches[0].clientX - e.touches[1].clientX,
                e.touches[0].clientY - e.touches[1].clientY
            );
        }
        e.preventDefault();
    };

    canvas.ontouchmove = (e) => {
        const rect = canvas.getBoundingClientRect();
        if (e.touches.length === 1 && isDragging) {
            const t = e.touches[0];
            handleMove((t.clientX - rect.left) * (canvas.width / rect.width), (t.clientY - rect.top) * (canvas.height / rect.height));
        } else if (e.touches.length === 2 && imgLoaded) {
            const currentDistance = Math.hypot(
                e.touches[0].clientX - e.touches[1].clientX,
                e.touches[0].clientY - e.touches[1].clientY
            );
            if (initialDistance !== null) {
                const delta = currentDistance / initialDistance;
                const newScale = Math.min(Math.max(scale * delta, 0.1), 2);
                scale = newScale;
                zoomInput.value = scale;
                initialDistance = currentDistance;
                draw();
            }
        }
        e.preventDefault();
    };

    canvas.ontouchend = () => {
        isDragging = false;
        initialDistance = null;
    };

    // സ്ലൈഡർ സൂം (സെന്റർ മാറാതെ)
    zoomInput.oninput = (e) => { 
        scale = parseFloat(e.target.value); 
        draw(); 
    };

    nameInput.oninput = () => draw();

    function downloadPoster() {
        const link = document.createElement('a');
        link.download = 'Eid_Poster.png';
        link.href = canvas.toDataURL();
        link.click();
    }
</script>

</body>
</html>
