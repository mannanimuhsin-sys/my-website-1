<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Annual Exam Result 2025-26</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --primary: #004d00; --secondary: #ffd700; --bg-light: #f4f7f6; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg-light); margin: 0; padding: 0; }
        
        .executive-header { 
            background: linear-gradient(135deg, #004d00 0%, #002200 100%); 
            color: white; padding: 40px 15px; text-align: center; border-bottom: 5px solid var(--secondary); 
        }
        .madrasa-name { font-size: 24px; font-weight: 800; margin: 0; text-transform: uppercase; }
        .madrasa-place { font-size: 16px; opacity: 0.9; }

        .container { max-width: 450px; margin: -30px auto 50px; padding: 0 15px; }
        
        .search-section { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; }
        .search-box { display: flex; flex-direction: column; gap: 10px; margin-top: 15px; }
        .search-box input { padding: 12px; border: 2px solid #ddd; border-radius: 10px; font-size: 16px; text-align: center; }
        .btn-search { background: #28a745; color: white; border: none; padding: 12px; border-radius: 10px; font-weight: bold; cursor: pointer; }

        /* Result Card Design */
        #captureArea { background: white; border-radius: 25px; overflow: hidden; display: none; box-shadow: 0 20px 50px rgba(0,0,0,0.1); }
        .card-header { background: var(--primary); color: white; padding: 25px 15px 50px; text-align: center; position: relative; }
        
        .profile-wrap { text-align: center; margin-top: -45px; position: relative; z-index: 5; }
        .student-photo { width: 110px; height: 110px; border-radius: 50%; border: 4px solid white; background: white; object-fit: cover; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        
        .student-info { text-align: center; padding: 10px 20px; }
        .student-info h3 { margin: 5px 0; color: #1a1a1a; font-size: 22px; text-transform: uppercase; }
        .student-info p { margin: 2px 0; color: #666; font-weight: 600; font-size: 14px; }

        /* Status Badge */
        .status-container { display: flex; justify-content: center; margin: 10px 0; }
        .status-pill { 
            padding: 8px 30px; border-radius: 25px; font-weight: 900; font-size: 16px; 
            letter-spacing: 1px; text-transform: uppercase; color: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .bg-passed { background: #27ae60; }
        .bg-failed { background: #e74c3c; }
        .bg-promoted { background: #2980b9; }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; padding: 15px; }
        .stat-box { background: #f8fafc; padding: 10px 5px; border-radius: 12px; text-align: center; border: 1px solid #eee; }
        .stat-box small { color: #7f8c8d; font-size: 9px; font-weight: bold; display: block; margin-bottom: 4px; }
        .stat-box span { font-size: 14px; font-weight: 800; color: #2c3e50; }

        .marks-table { width: 90%; margin: 0 auto 20px; border-collapse: collapse; }
        .marks-table th { text-align: left; padding: 10px; color: #95a5a6; font-size: 12px; border-bottom: 2px solid #f1f1f1; }
        .marks-table td { padding: 12px 10px; border-bottom: 1px solid #f9f9f9; font-weight: bold; font-size: 14px; }

        .card-footer { background: #f8fafc; padding: 15px; text-align: center; font-size: 10px; color: #bdc3c7; }
        
        .action-area { padding: 20px; display: none; }
        .btn-download { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 12px; width: 100%; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }
        
        .hidden { display: none; }
        .btn-whatsapp { 
    background: #25d366;  color: white;  border: none;  padding: 15px;  border-radius: 12px;   width: 100%;  font-weight: bold;  cursor: pointer;   display: flex;  align-items: center;  justify-content: center;  gap: 10px; margin-bottom: 10px; /* ഡൗൺലോഡ് ബട്ടണിന് മുകളിൽ ഗ്യാപ്പ് വരാൻ */ }
    /* Countdown Overlay */
#countdownOverlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: black; display: none; align-items: center; justify-content: center;
    z-index: 9999; flex-direction: column;
}
#countdownNumber {
    font-size: 120px; font-weight: 900;
    color: #ffd700; /* Golden Color */
    text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
    animation: zoomIn 1s infinite;
}
@keyframes zoomIn {
    0% { transform: scale(0.5); opacity: 0; }
    50% { opacity: 1; }
    100% { transform: scale(1.2); opacity: 0; }
}
    </style>
</head>
<body>
<div id="countdownOverlay">
    <div id="countdownNumber">9</div>
    <p style="color: white; letter-spacing: 2px; margin-top: 20px;">PREPARING RESULT...</p>
</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<div class="executive-header">
    <h1 class="madrasa-name" id="madHeader">Loading...</h1>
    <div class="madrasa-place" id="madPlace">Please wait</div>
</div>

<div class="container">
    <div id="searchSection" class="search-section">
        <h2 id="mainMadName" style="color: var(--primary); margin: 0; text-transform: uppercase; font-size: 20px;"></h2>
        <p id="mainMadPlace" style="color: #666; margin: 5px 0 15px 0; font-size: 14px;"></p>
        <hr style="border: 0; border-top: 1px dashed #ccc; margin-bottom: 20px;">
        
        <h3 style="margin:0; font-size: 16px; color: #444;">ANNUAL EXAM RESULT 2025-26</h3>
        <div class="search-box">
            <input type="number" id="regNoInput" placeholder="Register Number" inputmode="numeric">
            <button class="btn-search" onclick="fetchResult()">VIEW RESULT</button>
        </div>
    </div>

    <div id="captureArea">
        <div class="card-header">
            <h1 id="cardMadName" style="margin:0; font-size:20px; text-transform:uppercase;"></h1>
            <p id="cardMadPlace" style="margin:0; font-size:12px; opacity:0.9; margin-bottom:10px;"></p>
            <hr style="border:0; border-top:1px solid rgba(255,255,255,0.2); margin-bottom:10px;">
            <h2 style="margin:0; font-size:14px; letter-spacing:1px; color: var(--secondary);">ANNUAL EXAM RESULT 2025-26</h2>
        </div>
        
        <div class="profile-wrap" id="photoWrap">
            <img src="https://cdn-icons-png.flaticon.com/512/149/149071.png" class="student-photo">
        </div>
        

        <div class="student-info">
            <h3 id="stName">STUDENT NAME</h3>
            <p>REG NO: <span id="stReg">---</span></p>
            <p>CLASS: <span id="stClass">---</span></p>
        </div>

        <div class="status-container">
            <div id="statusPill" class="status-pill">PASSED</div>
        </div>

        <div class="stats-grid">
            <div class="stat-box"><small>ATTENDANCE</small><span id="attendance">0/0</span></div>
            <div class="stat-box"><small>TOTAL MARK</small><span id="totalMark">0/0</span></div>
            <div class="stat-box"><small>RANK</small><span id="stRank">---</span></div>
        </div>

        <table class="marks-table">
            <thead><tr><th>SUBJECT</th><th style="text-align:center;">MARK</th><th style="text-align:center;">GRADE</th></tr></thead>
            <tbody id="markList"></tbody>
        </table>

        <div class="card-footer">
            Designed by Muhsin Mannani
        </div>
    </div>

   <div id="actionArea" class="action-area">
    <button class="btn-whatsapp" onclick="shareToWhatsApp()">
        <i class="fab fa-whatsapp"></i> SHARE VIA WHATSAPP
    </button>
    
    <button class="btn-download" onclick="downloadImage()">
        <i class="fa fa-file-image"></i> DOWNLOAD RESULT (PNG)
    </button>
</div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

<script>
    const firebaseConfig = { 
        apiKey: "AIzaSyBriz_0zYwQOcwVgd3XTQ0l-0NKBNYaZXQ", 
        authDomain: "misbahul-uloom-madrasa-4830c.firebaseapp.app", 
        projectId: "misbahul-uloom-madrasa-4830c", 
        appId: "1:370558703441:web:dc68dbdbd685c9d07ea570" 
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const urlParams = new URLSearchParams(window.location.search);
    const mId = urlParams.get('id');
    let fullData = null;

   if(mId) {
    db.collection("madrasa_data").where("uID", "==", mId).get().then((snapshot) => {
        if (!snapshot.empty) {
            fullData = snapshot.docs[0].data();
            const name = fullData.info.name;
            const place = fullData.info.place || "";

            // ലോഡിങ് ടെക്സ്റ്റ് മാറ്റി പേര് ഉടൻ കാണിക്കാൻ
            document.getElementById('madHeader').innerText = name;
            document.getElementById('madPlace').innerText = place;
            
            // മറ്റ് സ്ഥലങ്ങളിലും പേര് നൽകുന്നു
            if(document.getElementById('mainMadName')) document.getElementById('mainMadName').innerText = name;
            if(document.getElementById('mainMadPlace')) document.getElementById('mainMadPlace').innerText = place;
            if(document.getElementById('cardMadName')) document.getElementById('cardMadName').innerText = name;
            if(document.getElementById('cardMadPlace')) document.getElementById('cardMadPlace').innerText = place;
        }
    });
}

  function fetchResult() {
    const regInput = document.getElementById('regNoInput').value.trim();
    if(!regInput || !fullData) return alert("Enter Register Number");
    
    let foundCls = null, foundRes = null;
    
    // റിസൾട്ട് ഉണ്ടോ എന്ന് ആദ്യം പരിശോധിക്കുന്നു
    for(let cls in fullData.results) {
        if(fullData.results[cls][regInput]) {
            foundCls = cls;
            foundRes = fullData.results[cls][regInput];
            break;
        }
    }

    if(!foundCls) return alert("Result not found!");

    // കൗണ്ട്ഡൗൺ തുടങ്ങുന്നു
    startCountdown(9, () => {
        displayResult(foundCls, regInput, foundRes);
        
        // പാസ്സായ കുട്ടിയാണെങ്കിൽ മാത്രം വർണ്ണക്കടലാസ് പൊട്ടിക്കുന്നു
        if (foundRes.status.toLowerCase() === 'passed') {
            celebrate();
        }
    });
}

function startCountdown(seconds, callback) {
    const overlay = document.getElementById('countdownOverlay');
    const display = document.getElementById('countdownNumber');
    overlay.style.display = 'flex';
    
    let current = seconds;
    display.innerText = current;

    const timer = setInterval(() => {
        current--;
        if (current >= 1) {
            display.innerText = current;
        } else {
            clearInterval(timer);
            overlay.style.display = 'none';
            callback();
        }
    }, 1000);
}

function celebrate() {
    var duration = 5 * 1000;
    var animationEnd = Date.now() + duration;
    var defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 0 };

    function randomInRange(min, max) {
        return Math.random() * (max - min) + min;
    }

    var interval = setInterval(function() {
        var timeLeft = animationEnd - Date.now();
        if (timeLeft <= 0) return clearInterval(interval);

        var particleCount = 50 * (timeLeft / duration);
        // ഇടത് വശത്ത് നിന്നും വലത് വശത്ത് നിന്നും വർണ്ണക്കടലാസുകൾ വരുന്നു
        confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } }));
        confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } }));
    }, 250);
}

   function displayResult(cls, reg, res) {
    document.getElementById('searchSection').style.display = 'none';
    document.getElementById('captureArea').style.display = 'block';
    document.getElementById('actionArea').style.display = 'block';
    
    const photoURL = (fullData.photos && fullData.photos[reg]) ? fullData.photos[reg] : 'https://cdn-icons-png.flaticon.com/512/149/149071.png';
    document.getElementById('photoWrap').innerHTML = `<img src="${photoURL}" class="student-photo">`;
    
   // പേര് കണ്ടെത്താനുള്ള കൂടുതൽ കൃത്യമായ ലോജിക്
    let stName = "Student";
    
    // 1. ആദ്യം results ഒബ്ജക്റ്റിൽ പേരുണ്ടോ എന്ന് നോക്കുന്നു
    if (res.name) {
        stName = res.name;
    } 
    // 2. ഇല്ലെങ്കിൽ students ലിസ്റ്റിൽ തിരയുന്നു
    else if (fullData.students && fullData.students[cls] && fullData.students[cls][reg]) {
        const studentData = fullData.students[cls][reg];
        
        if (typeof studentData === 'object') {
            // ഒബ്ജക്റ്റ് ആണെങ്കിൽ അതിലെ സാധ്യമായ കീ കൾ പരിശോധിക്കുന്നു
            stName = studentData.name || studentData.stName || studentData.studentName || "Student";
        } else {
            stName = studentData;
        }
    }
    
    // ഒരുപക്ഷേ ഇപ്പോഴും [object Object] എന്ന് വരുന്നുണ്ടെങ്കിൽ അത് ഫോഴ്സ് ആയി ഒഴിവാക്കാൻ:
    if (stName.toString().includes("[object Object]")) {
        stName = "Student Name Error";
    }

    document.getElementById('stName').innerText = stName;
    document.getElementById('stReg').innerText = reg;
    document.getElementById('stClass').innerText = cls;
    document.getElementById('stRank').innerText = res.rank || "---";

    // Status Logic
    const pill = document.getElementById('statusPill');
    const sts = res.status.toLowerCase();
    pill.innerText = res.status.toUpperCase();
    pill.className = "status-pill " + (sts === 'passed' ? 'bg-passed' : sts === 'failed' ? 'bg-failed' : 'bg-promoted');

    // Marks Logic
    let mHtml = "";
    let subCount = 0;
    for(let sub in res.marks) {
        let m = res.marks[sub];
        mHtml += `<tr><td>${sub}</td><td style="text-align:center;">${m}</td><td style="text-align:center;">${calculateGrade(m)}</td></tr>`;
        subCount++;
    }
    document.getElementById('markList').innerHTML = mHtml;
    
    // Total Mark Logic
    const maxMarks = subCount * 50;
    document.getElementById('totalMark').innerText = res.total + "/" + maxMarks;
    
    // Attendance
    document.getElementById('attendance').innerText = res.att + "/" + (fullData.attSettings[cls] || 0);
}
    function calculateGrade(m) {
        let mark = parseFloat(m);
        if (mark >= 45) return "A+";
        if (mark >= 40) return "A";
        if (mark >= 35) return "B+";
        if (mark >= 30) return "B";
        if (mark >= 25) return "C+";
        if (mark >= 20) return "C";
        if (mark >= 18) return "D+";
        return "D";
    }

    function downloadImage() {
        const btn = document.querySelector('.btn-download');
        btn.innerText = "Generating...";
        html2canvas(document.querySelector("#captureArea"), {
            useCORS: true,
            scale: 3 // Higher quality
        }).then(canvas => {
            const link = document.createElement('a');
            link.download = 'Result_' + document.getElementById('stReg').innerText + '.png';
            link.href = canvas.toDataURL("image/png");
            link.click();
            btn.innerHTML = '<i class="fa fa-file-image"></i> DOWNLOAD RESULT (PNG)';
        });
    }
    async function shareToWhatsApp() {
    const btn = document.querySelector('.btn-whatsapp');
    const originalText = btn.innerHTML;
    btn.innerText = "Preparing...";

    try {
        const canvas = await html2canvas(document.querySelector("#captureArea"), {
            useCORS: true,
            scale: 2
        });
        
        const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
        const file = new File([blob], 'Result.png', { type: 'image/png' });

        // ഫോണിൽ ഷെയർ ഓപ്ഷൻ ഉണ്ടോ എന്ന് പരിശോധിക്കുന്നു
        if (navigator.canShare && navigator.canShare({ files: [file] })) {
            await navigator.share({
                files: [file],
                title: 'Annual Exam Result',
                text: 'Check out the Annual Exam Result 2025-26'
            });
        } else {
            alert("നിങ്ങളുടെ ബ്രൗസർ നേരിട്ടുള്ള ഷെയറിംഗിനെ പിന്തുണയ്ക്കുന്നില്ല. ദയവായി ഡൗൺലോഡ് ചെയ്ത് ഷെയർ ചെയ്യുക.");
        }
    } catch (err) {
        console.error('Share failed:', err);
    } finally {
        btn.innerHTML = originalText;
    }
}
</script>
</body>
</html>
