<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Annual Exam Result 2025-26</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --primary: #004d00; --secondary: #ffd700; --bg-light: #f4f7f6; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg-light); margin: 0; padding: 0; }
        
        .executive-header { 
            background: linear-gradient(135deg, #004d00 0%, #002200 100%); 
            color: white; padding: 40px 15px; text-align: center; border-bottom: 5px solid var(--secondary); 
        }
        .madrasa-name { font-size: 24px; font-weight: 800; margin: 0; text-transform: uppercase; }
        .madrasa-place { font-size: 16px; opacity: 0.9; }

        .container { max-width: 450px; margin: -30px auto 50px; padding: 0 15px; }
        
        .search-section { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; }
        .search-box { display: flex; flex-direction: column; gap: 10px; margin-top: 15px; }
        .search-box input { padding: 12px; border: 2px solid #ddd; border-radius: 10px; font-size: 16px; text-align: center; }
        .btn-search { background: #28a745; color: white; border: none; padding: 12px; border-radius: 10px; font-weight: bold; cursor: pointer; }

        /* Result Card Design */
        #captureArea { background: white; border-radius: 25px; overflow: hidden; display: none; box-shadow: 0 20px 50px rgba(0,0,0,0.1); }
        .card-header { background: var(--primary); color: white; padding: 25px 15px 50px; text-align: center; position: relative; }
        
        .profile-wrap { text-align: center; margin-top: -45px; position: relative; z-index: 5; }
        .student-photo { width: 110px; height: 110px; border-radius: 50%; border: 4px solid white; background: white; object-fit: cover; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        
        .student-info { text-align: center; padding: 10px 20px; }
        .student-info h3 { margin: 5px 0; color: #1a1a1a; font-size: 22px; text-transform: uppercase; }
        .student-info p { margin: 2px 0; color: #666; font-weight: 600; font-size: 14px; }

        /* Status Badge */
        .status-container { display: flex; justify-content: center; margin: 10px 0; }
        .status-pill { 
            padding: 8px 30px; border-radius: 25px; font-weight: 900; font-size: 16px; 
            letter-spacing: 1px; text-transform: uppercase; color: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .bg-passed { background: #27ae60; }
        .bg-failed { background: #e74c3c; }
        .bg-promoted { background: #2980b9; }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; padding: 15px; }
        .stat-box { background: #f8fafc; padding: 10px 5px; border-radius: 12px; text-align: center; border: 1px solid #eee; }
        .stat-box small { color: #7f8c8d; font-size: 9px; font-weight: bold; display: block; margin-bottom: 4px; }
        .stat-box span { font-size: 14px; font-weight: 800; color: #2c3e50; }

        .marks-table { width: 90%; margin: 0 auto 20px; border-collapse: collapse; }
        .marks-table th { text-align: left; padding: 10px; color: #95a5a6; font-size: 12px; border-bottom: 2px solid #f1f1f1; }
        .marks-table td { padding: 12px 10px; border-bottom: 1px solid #f9f9f9; font-weight: bold; font-size: 14px; }

        .card-footer { background: #f8fafc; padding: 15px; text-align: center; font-size: 10px; color: #bdc3c7; }
        
        .action-area { padding: 20px; display: none; }
        .btn-download { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 12px; width: 100%; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }
        
        .hidden { display: none; }
        .btn-whatsapp { 
    background: #25d366;  color: white;  border: none;  padding: 15px;  border-radius: 12px;   width: 100%;  font-weight: bold;  cursor: pointer;   display: flex;  align-items: center;  justify-content: center;  gap: 10px; margin-bottom: 10px; /* ഡൗൺലോഡ് ബട്ടണിന് മുകളിൽ ഗ്യാപ്പ് വരാൻ */ }
    /* Countdown Overlay */
#countdownOverlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: black; display: none; align-items: center; justify-content: center;
    z-index: 9999; flex-direction: column;
}
#countdownNumber {
    font-size: 120px; font-weight: 900;
    color: #ffd700; /* Golden Color */
    text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
    animation: zoomIn 1s infinite;
}
@keyframes zoomIn {
    0% { transform: scale(0.5); opacity: 0; }
    50% { opacity: 1; }
    100% { transform: scale(1.2); opacity: 0; }
}
/* റാങ്ക് ബാഡ്ജ് സ്റ്റൈൽ */
.rank-badge-overlay {
    position: absolute;
    top: 10px;
    right: 15px;
    z-index: 10;
    text-align: center;
    animation: badgeBounce 1.5s ease-in-out infinite;
}

.medal-icon {
    font-size: 50px;
    filter: drop-shadow(0 5px 10px rgba(0,0,0,0.2));
}

.rank-text-badge {
    display: block;
    font-size: 12px;
    font-weight: 900;
    color: white;
    margin-top: -5px;
    text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
}

@keyframes badgeBounce {
    0%, 100% { transform: translateY(0) scale(1); }
    50% { transform: translateY(-5px) scale(1.1); }
}

/* റാങ്ക് അനുസരിച്ചുള്ള നിറങ്ങൾ */
.gold { color: #ffd700; }   /* First Rank */
.silver { color: #c0c0c0; } /* Second Rank */
.bronze { color: #cd7f32; } /* Third Rank */
    </style>
</head>

<div class="container">

        <div class="student-info">

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

<script>
    const firebaseConfig = { 
        apiKey: "AIzaSyBriz_0zYwQOcwVgd3XTQ0l-0NKBNYaZXQ", 
        authDomain: "misbahul-uloom-madrasa-4830c.firebaseapp.app", 
        projectId: "misbahul-uloom-madrasa-4830c", 
        appId: "1:370558703441:web:dc68dbdbd685c9d07ea570" 
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const urlParams = new URLSearchParams(window.location.search);
    const mId = urlParams.get('id');
    let fullData = null;

  if(mId) {
    // മദ്രസ പേര് വരുന്നത് വരെ സെർച്ച് ബട്ടൺ ഓഫ് ചെയ്യുന്നു
    const sBtn = document.querySelector('.btn-search');
    if(sBtn) {
        sBtn.disabled = true;
        sBtn.innerText = "LOADING DATA...";
    }

    db.collection("madrasa_data").where("uID", "==", mId).onSnapshot((snapshot) => {
        if (!snapshot.empty) {
            fullData = snapshot.docs[0].data();
            
            // പേര് സെറ്റ് ചെയ്യുന്നു
            const name = fullData.info.name;
            const place = fullData.info.place || "";
            document.getElementById('madHeader').innerText = name;
            document.getElementById('madPlace').innerText = place;
            document.getElementById('mainMadName').innerText = name;
            document.getElementById('mainMadPlace').innerText = place;
            document.getElementById('cardMadName').innerText = name;
            document.getElementById('cardMadPlace').innerText = place;

            // ഡാറ്റ ലോഡ് ആയിക്കഴിഞ്ഞാൽ ബട്ടൺ ഓൺ ആക്കുന്നു
            if(sBtn) {
                sBtn.disabled = false;
                sBtn.innerText = "VIEW RESULT";
            }
        }
    });
}

  function fetchResult() {
    const regInput = document.getElementById('regNoInput').value.trim();
    if(!regInput || !fullData) return alert("Enter Register Number");
    
    let foundCls = null, foundRes = null;
    
    // റിസൾട്ട് ഉണ്ടോ എന്ന് ആദ്യം പരിശോധിക്കുന്നു
    for(let cls in fullData.results) {
        if(fullData.results[cls][regInput]) {
            foundCls = cls;
            foundRes = fullData.results[cls][regInput];
            break;
        }
    }

    if(!foundCls) return alert("Result not found!");

    // കൗണ്ട്ഡൗൺ തുടങ്ങുന്നു
    startCountdown(9, () => {
        displayResult(foundCls, regInput, foundRes);
        
        // പാസ്സായ കുട്ടിയാണെങ്കിൽ മാത്രം വർണ്ണക്കടലാസ് പൊട്ടിക്കുന്നു
        if (foundRes.status.toLowerCase() === 'passed') {
            celebrate();
        }
    });
}

function startCountdown(seconds, callback) {
    const overlay = document.getElementById('countdownOverlay');
    const display = document.getElementById('countdownNumber');
    overlay.style.display = 'flex';
    
    let current = seconds;
    display.innerText = current;

    const timer = setInterval(() => {
        current--;
        if (current >= 1) {
            display.innerText = current;
        } else {
            clearInterval(timer);
            overlay.style.display = 'none';
            callback();
        }
    }, 1000);
}

function celebrate() {
    var duration = 5 * 1000;
    var animationEnd = Date.now() + duration;
    var defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 0 };

    function randomInRange(min, max) {
        return Math.random() * (max - min) + min;
    }

    var interval = setInterval(function() {
        var timeLeft = animationEnd - Date.now();
        if (timeLeft <= 0) return clearInterval(interval);

        var particleCount = 50 * (timeLeft / duration);
        // ഇടത് വശത്ത് നിന്നും വലത് വശത്ത് നിന്നും വർണ്ണക്കടലാസുകൾ വരുന്നു
        confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } }));
        confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } }));
    }, 250);
}

 function displayResult(cls, reg, res) {

    document.getElementById('searchSection').style.display = 'none';
    document.getElementById('captureArea').style.display = 'block';
    document.getElementById('actionArea').style.display = 'block';

    const photoURL = (fullData.photos && fullData.photos[reg]) 
        ? fullData.photos[reg] 
        : 'https://cdn-icons-png.flaticon.com/512/149/149071.png';

    document.getElementById('photoWrap').innerHTML =
        `<img src="${photoURL}" class="student-photo">`;

    let stName = "";

    if (res.name && isNaN(res.name)) {
        stName = res.name;
    } 
    else if (fullData.students && fullData.students[cls] && fullData.students[cls][reg]) {
        let sData = fullData.students[cls][reg];

        if (typeof sData === 'object') {
            stName = sData.name || sData.stName || sData.studentName || "";
        } 
        else if (isNaN(sData)) {
            stName = sData;
        }
    }

    if (!stName || !isNaN(stName) || stName.toString().includes("[object Object]")) {
        stName = "STUDENT NAME";
    }

    document.getElementById('stName').innerText = stName.toUpperCase();
    document.getElementById('stReg').innerText = reg;
    document.getElementById('stClass').innerText = cls;
    document.getElementById('stRank').innerText = res.rank || "---";


    /* ---------- STATUS PILL FIX ---------- */

    const pill = document.getElementById('statusPill');
    const sts = res.status ? res.status.toLowerCase().trim() : "";

    pill.innerText = (res.status || "RESULT").toUpperCase();

    if (sts.includes("pass")) {
        pill.className = "status-pill bg-passed";
    }
    else if (sts.includes("promote")) {
        pill.className = "status-pill bg-promoted";
    }
    else {
        pill.className = "status-pill bg-failed";
    }


    /* ---------- MARK TABLE ---------- */

    let mHtml = "";
    let subCount = 0;

    for(let sub in res.marks) {

        let m = res.marks[sub];

        mHtml += `
        <tr>
        <td>${sub}</td>
        <td style="text-align:center;">${m}</td>
        <td style="text-align:center;">${calculateGrade(m)}</td>
        </tr>`;

        subCount++;
    }

    document.getElementById('markList').innerHTML = mHtml;


    /* ---------- TOTAL & ATTENDANCE ---------- */

    const maxMarks = subCount * 50;

    document.getElementById('totalMark').innerText =
        (res.total || 0) + "/" + maxMarks;

    document.getElementById('attendance').innerText =
        (res.att || 0) + "/" +
        (fullData.attSettings && fullData.attSettings[cls]
            ? fullData.attSettings[cls]
            : 0);


    /* ---------- RANK BADGE ---------- */

    const badgeDiv = document.getElementById('rankBadgePlaceholder');
    badgeDiv.innerHTML = "";

    let r = res.rank ? res.rank.toString() : "";

    if (r === "1") {

        badgeDiv.innerHTML =
        `<div class="rank-badge-overlay">
        <i class="fa fa-medal gold medal-icon"></i>
        <span class="rank-text-badge">1st RANK</span>
        </div>`;

    }

    else if (r === "2") {

        badgeDiv.innerHTML =
        `<div class="rank-badge-overlay">
        <i class="fa fa-medal silver medal-icon"></i>
        <span class="rank-text-badge">2nd RANK</span>
        </div>`;

    }

    else if (r === "3") {

        badgeDiv.innerHTML =
        `<div class="rank-badge-overlay">
        <i class="fa fa-medal bronze medal-icon"></i>
        <span class="rank-text-badge">3rd RANK</span>
        </div>`;

    }


    /* ---------- VOICE ANNOUNCEMENT ---------- */

    announceResult(stName, res.total, maxMarks, res.rank, res.status);
}

function announceResult(name, total, maxMark, rank, status) {

    window.speechSynthesis.cancel();

    const sts = status ? status.toLowerCase().trim() : "";
    let rString = rank ? rank.toString().trim() : "";
    let malayalamRank = "";


    const rankMap = {
        "1": "ഒന്നാം",
        "2": "രണ്ടാം",
        "3": "മൂന്നാം",
        "4": "നാലാം",
        "5": "അഞ്ചാം",
        "6": "ആറാം",
        "7": "ഏഴാം",
        "8": "എട്ടാം",
        "9": "ഒൻപതാം",
        "10": "പത്താം"
    };


    if (rString && rString !== "---" && !isNaN(rString)) {

        let rankText = rankMap[rString] || rString + "-ാം";
        malayalamRank = rankText + " സ്ഥാനം നേടി";

    }

    else {

        malayalamRank = "വിജയകരമായി";

    }


 let voices = speechSynthesis.getVoices();
if (!voices.length) {
    speechSynthesis.onvoiceschanged = () => {
        announceResult(name, total, maxMark, rank, status);
    };
    return;
}
    let maleVoiceML =
        voices.find(v =>
            v.lang.includes('ml') &&
            (v.name.toLowerCase().includes('male') ||
             v.name.toLowerCase().includes('david'))
        );


    /* ---------- INTRO ---------- */

    let introText = "";

    if (sts.includes("pass")) {

        introText = "അഭിനന്ദനങ്ങൾ";

    }

    else if (sts.includes("promote")) {

        introText = "പ്രമോഷൻ ലഭിച്ചു";

    }

    else {

        introText = "ക്ഷമിക്കണം";

    }


    let utterIntro = new SpeechSynthesisUtterance(introText);

    utterIntro.lang = 'ml-IN';
    utterIntro.rate = 0.8;

    if (maleVoiceML) utterIntro.voice = maleVoiceML;

    window.speechSynthesis.speak(utterIntro);



    /* ---------- NAME ---------- */

    let utterName = new SpeechSynthesisUtterance(name.toLowerCase().trim());

    utterName.lang = 'en-IN';
    utterName.rate = 0.8;

    window.speechSynthesis.speak(utterName);



    /* ---------- OUTRO ---------- */

    let outroText = "";


    if (sts.includes("pass")) {

        outroText =
        `എന്ന വിദ്യാർത്ഥി ${maxMark}-ൽ ${total} മാർക്കോടെ ${malayalamRank} വിജയിച്ചിരിക്കുന്നു`;

    }

    else if (sts.includes("promote")) {

        outroText =
        `എന്ന വിദ്യാർത്ഥിക്ക് ഈ പരീക്ഷയിൽ മാർക്ക് കുറവാണെങ്കിലും അടുത്ത ക്ലാസിലേക്ക് പ്രമോഷൻ നൽകിയിരിക്കുന്നു. അടുത്ത പരീക്ഷകളിൽ കൂടുതൽ ശ്രദ്ധിക്കുക`;

    }

    else {

        outroText =
        `എന്ന വിദ്യാർത്ഥി ഈ പരീക്ഷയിൽ പരാജയപ്പെട്ടിരിക്കുന്നു. വിഷമിക്കാതെ അടുത്ത തവണ കൂടുതൽ പരിശ്രമിക്കുക`;

    }


    let utterOutro = new SpeechSynthesisUtterance(outroText);

    utterOutro.lang = 'ml-IN';
    utterOutro.rate = 0.8;

    if (maleVoiceML) utterOutro.voice = maleVoiceML;

    window.speechSynthesis.speak(utterOutro);

}

    async function shareToWhatsApp() {
    const btn = document.querySelector('.btn-whatsapp');
    const originalText = btn.innerHTML;
    btn.innerText = "Preparing...";

    try {
        const canvas = await html2canvas(document.querySelector("#captureArea"), {
            useCORS: true,
            scale: 2
        });
        
        const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
        const file = new File([blob], 'Result.png', { type: 'image/png' });

        // ഫോണിൽ ഷെയർ ഓപ്ഷൻ ഉണ്ടോ എന്ന് പരിശോധിക്കുന്നു
        if (navigator.canShare && navigator.canShare({ files: [file] })) {
            await navigator.share({
                files: [file],
                title: 'Annual Exam Result',
                text: 'Check out the Annual Exam Result 2025-26'
            });
        } else {
