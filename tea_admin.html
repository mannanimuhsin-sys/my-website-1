<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>മദ്രസ ചായ വിതരണം - Admin</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .container { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); width: 100%; max-width: 500px; }
        .section { background: #f8f9fa; padding: 15px; border-radius: 10px; margin-bottom: 15px; border: 1px solid #ddd; }
        .row { display: flex; gap: 10px; margin-bottom: 10px; }
        input, select { padding: 12px; border: 1px solid #ccc; border-radius: 8px; width: 100%; box-sizing: border-box; }
        .btn { background: #27ae60; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; cursor: pointer; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 0.8rem; }
        th { background: #1a2a6c; color: white; padding: 10px; }
        td { padding: 10px; border-bottom: 1px solid #eee; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <h2>അഡ്മിൻ പാനൽ</h2>
    <label>തിയതി (1-31):</label>
    <select id="daySelect" style="margin-bottom: 15px;">
        <script>for(let i=1; i<=31; i++) document.write(`<option value="${i}">${i}</option>`);</script>
    </select>

    <div class="section">
        <strong>☕ രാവിലെ</strong>
        <div class="row">
            <input type="text" id="mName" placeholder="പേര്">
            <input type="text" id="mClass" placeholder="ക്ലാസ്" style="width: 80px;">
        </div>
    </div>

    <div class="section">
        <strong>🍵 വൈകിട്ട്</strong>
        <div class="row">
            <input type="text" id="eName" placeholder="പേര്">
            <input type="text" id="eClass" placeholder="ക്ലാസ്" style="width: 80px;">
        </div>
    </div>

    <button class="btn" onclick="saveToFirebase()">ഡാറ്റാബേസിലേക്ക് സേവ് ചെയ്യുക</button>

    <div id="status" style="text-align: center; margin-top: 10px; color: green; font-weight: bold;"></div>

    <table>
        <thead><tr><th>തിയതി</th><th>രാവിലെ</th><th>വൈകിട്ട്</th><th>#</th></tr></thead>
        <tbody id="listBody"></tbody>
    </table>
</div>

<script>
    // Firebase Configuration
    const firebaseConfig = {
        apiKey: "AIzaSyBriz_0zYwQOcwVgd3XTQ0l-0NKBNYaZXQ",
        authDomain: "misbahul-uloom-madrasa-4830c.firebaseapp.com",
        projectId: "misbahul-uloom-madrasa-4830c",
        databaseURL: "https://misbahul-uloom-madrasa-4830c-default-rtdb.firebaseio.com/",
        storageBucket: "misbahul-uloom-madrasa-4830c.firebasestorage.app",
        messagingSenderId: "370558703441",
        appId: "1:370558703441:web:dc68dbdbd685c9d07ea570"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function saveToFirebase() {
        const day = document.getElementById('daySelect').value;
        const data = {
            mName: document.getElementById('mName').value,
            mClass: document.getElementById('mClass').value,
            eName: document.getElementById('eName').value,
            eClass: document.getElementById('eClass').value
        };

        db.ref('teaSchedule/' + day).set(data).then(() => {
            document.getElementById('status').innerText = "Saved Successfully!";
            setTimeout(() => { document.getElementById('status').innerText = ""; }, 2000);
        });
    }

    db.ref('teaSchedule').on('value', (snap) => {
        const list = snap.val();
        const table = document.getElementById('listBody');
        table.innerHTML = "";
        for(let d in list) {
            table.innerHTML += `<tr><td>${d}</td><td>${list[d].mName}</td><td>${list[d].eName}</td><td style="color:red; cursor:pointer;" onclick="deleteData('${d}')">X</td></tr>`;
        }
    });

    function deleteData(day) {
        if(confirm("Delete this?")) db.ref('teaSchedule/' + day).remove();
    }
</script>
</body>
</html>
