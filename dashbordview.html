<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Misbahul Uloom - Student List</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f4f7f6; padding: 15px; margin: 0; }
        .container { max-width: 1100px; margin: 20px auto; background: #fff; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); padding: 25px; border-top: 5px solid #2c3e50; }
        h1 { text-align: center; color: #2c3e50; margin-bottom: 5px; font-size: 26px; }
        .subtitle { text-align: center; color: #666; margin-bottom: 25px; font-size: 14px; }
        .table-responsive { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 640px; }
        th, td { border: 1px solid #eee; padding: 12px 8px; text-align: center; font-size: 13px; }
        th { background: #2c3e50; color: #fff; text-transform: uppercase; }
        .boys { color: #0b5ed7; font-weight: bold; }
        .girls { color: #d63384; font-weight: bold; }
        .total-cell { color: #198754; font-weight: bold; background: #f9f9f9; }
        .contact-btns { display: inline-flex; gap: 6px; align-items: center; justify-content: center; }
        .contact-btns a { font-size: 16px; margin: 0 4px; padding: 6px; transition: 0.3s; text-decoration: none; }
        .call { color: #0d6efd; } .whatsapp { color: #25D366; }
        tfoot tr { background: #2c3e50; color: white; font-weight: bold; }
        @media (max-width: 720px) {
            body { padding: 10px; }
            .container { margin: 10px auto; padding: 18px; }
            h1 { font-size: 22px; }
            .subtitle { font-size: 12px; }
            table { min-width: 100%; }
            th, td { padding: 10px 6px; font-size: 12px; }
            .contact-btns a { font-size: 14px; margin: 0 3px; padding: 5px; }
            td:nth-child(5) { text-align: left; }
        }
        @media (max-width: 640px) {
            .table-responsive { overflow: hidden; }
            table { display: block; width: 100%; }
            thead { display: none; }
            tbody tr { display: block; margin-bottom: 14px; background: #fff; border: 1px solid #e5e7eb; border-radius: 14px; box-shadow: 0 4px 14px rgba(0,0,0,0.04); }
            td { display: flex; justify-content: space-between; align-items: center; padding: 10px 12px; border: none; border-bottom: 1px solid #f1f1f1; text-align: left; }
            td:last-child { border-bottom: none; }
            td:before { content: attr(data-label); flex: 0 0 42%; color: #525252; font-weight: 600; }
            .total-cell { background: transparent; }
            .contact-btns { justify-content: flex-end; width: 100%; }
            .contact-btns a { margin: 0 4px; }
            tfoot, tfoot tr, tfoot td { display: none; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>വിദ്യാർത്ഥി വിവര പട്ടിക</h1>
    <div class="subtitle">MISBAHUL ULOOM MADRASA PERUVANA</div>
    <div class="table-responsive">
        <table>
            <thead>
                <tr>
                    <th rowspan="2">CLASS</th>
                    <th colspan="3">വിദ്യാർത്ഥികളുടെ എണ്ണം</th>
                    <th rowspan="2">CLASS USTHAD</th>
                    <th rowspan="2">CONTACT</th>
                </tr>
                <tr>
                    <th>BOYS</th> <th>GIRLS</th> <th>TOTAL</th>
                </tr>
            </thead>
            <tbody id="viewTableBody"></tbody>
            <tfoot id="viewTableFoot"></tfoot>
        </table>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBriz_0zYwQOcwVgd3XTQ0l-0NKBNYaZXQ",
        authDomain: "misbahul-uloom-madrasa-4830c.firebaseapp.com",
        projectId: "misbahul-uloom-madrasa-4830c",
        storageBucket: "misbahul-uloom-madrasa-4830c.firebasestorage.app",
        messagingSenderId: "370558703441",
        appId: "1:370558703441:web:dc68dbdbd685c9d07ea570"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    function listenData() {
        db.collection("stats").doc("current").onSnapshot(doc => {
            if(!doc.exists) return;
            let data = doc.data().list;
            let rows = "", tb = 0, tg = 0, tt = 0;

            data.forEach(item => {
                let b = parseInt(item.boys) || 0, g = parseInt(item.girls) || 0;
                let rowTotal = b + g;
                tb += b; tg += g; tt += rowTotal;

                rows += `<tr>
                    <td data-label="CLASS"><b>${item.class}</b></td>
                    <td class="boys" data-label="BOYS">${b}</td>
                    <td class="girls" data-label="GIRLS">${g}</td>
                    <td class="total-cell" data-label="TOTAL">${rowTotal}</td>
                    <td data-label="CLASS USTHAD" style="text-align:left">${item.usthad}</td>
                    <td data-label="CONTACT">
                        <div class="contact-btns">
                            <a href="tel:${item.phone}" class="call"><i class="fa fa-phone-alt"></i></a>
                            <a href="https://wa.me/91${item.phone}" class="whatsapp"><i class="fab fa-whatsapp"></i></a>
                        </div>
                    </td>
                </tr>`;
            });
            document.getElementById('viewTableBody').innerHTML = rows;
            document.getElementById('viewTableFoot').innerHTML = `<tr>
                <td>ആകെ</td> <td>${tb}</td> <td>${tg}</td> <td>${tt}</td>
                <td colspan="2">TOTAL STRENGTH</td>
            </tr>`;
        });
    }
    window.onload = listenData;
</script>
</body>
</html>
