<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ചായ വിതരണം - സമ്പൂർണ്ണ പട്ടിക</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f9; margin: 0; padding: 0; }
        .header { background: #1a2a6c; color: white; padding: 30px 15px; text-align: center; border-bottom-left-radius: 30px; border-bottom-right-radius: 30px; }
        .container { padding: 20px; max-width: 600px; margin: -20px auto 50px auto; }
        
        .tea-card { 
            background: white; border-radius: 20px; padding: 15px; margin-bottom: 15px;
            display: flex; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            border: 1px solid #eee;
        }
        .date-box { 
            background: #ff9100; color: white; min-width: 50px; height: 50px; 
            border-radius: 12px; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; font-weight: bold; margin-right: 15px;
        }
        .date-box small { font-size: 10px; text-transform: uppercase; }

        .details { flex-grow: 1; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .slot { padding: 10px; border-radius: 12px; }
        .morning { background: #fffde7; border-left: 4px solid #fbc02d; }
        .evening { background: #e3f2fd; border-left: 4px solid #2196f3; }
        
        .slot-title { font-size: 10px; font-weight: bold; color: #777; display: block; }
        .name { font-size: 14px; font-weight: bold; color: #222; display: block; margin: 2px 0; }
        .class-no { font-size: 11px; color: #555; font-weight: bold; }

        #loading-screen { text-align: center; padding: 50px; color: #1a2a6c; font-weight: bold; }
        .back-home { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #1a2a6c; color: white; padding: 12px 30px; border-radius: 50px; text-decoration: none; font-weight: bold; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

<div class="header">
    <h2>ചായ വിതരണ പട്ടിക</h2>
    <p>മിസ്ബാഹുൽ ഉലൂം മദ്രസ പെരുവണ</p>
</div>

<div class="container">
    <div id="loading-screen">
        <i class="fas fa-spinner fa-spin fa-2x"></i><br><br>വിവരങ്ങൾ ശേഖരിക്കുന്നു...
    </div>
    <div id="teaList"></div>
</div>

<a href="index.html" class="back-home"><i class="fas fa-home"></i> ഹോം പേജിലേക്ക്</a>
<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBriz_0zYwQOcwVgd3XTQ0l-0NKBNYaZXQ",
        authDomain: "misbahul-uloom-madrasa-4830c.firebaseapp.com",
        projectId: "misbahul-uloom-madrasa-4830c",
        databaseURL: "https://misbahul-uloom-madrasa-4830c-default-rtdb.firebaseio.com/",
        storageBucket: "misbahul-uloom-madrasa-4830c.firebasestorage.app",
        messagingSenderId: "370558703441",
        appId: "1:370558703441:web:dc68dbdbd685c9d07ea570"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // ഡാറ്റാബേസിൽ നിന്ന് വിവരങ്ങൾ വലിച്ചെടുക്കുന്നു
    db.ref('teaSchedule').on('value', (snapshot) => {
        const listContainer = document.getElementById('teaList');
        const loader = document.getElementById('loading-screen');
        const data = snapshot.val();
        
        loader.style.display = 'none';
        listContainer.innerHTML = "";

        if (data) {
            // തിയതി ക്രമത്തിൽ അടുക്കുന്നു (1, 2, 3...)
            const days = Object.keys(data).sort((a, b) => a - b);
            
            days.forEach(day => {
                const info = data[day];
                listContainer.innerHTML += `
                    <div class="tea-card">
                        <div class="date-box">
                            <small>Date</small>${day}
                        </div>
                        <div class="details">
                            <div class="slot morning">
                                <span class="slot-title">☀️ MORNING</span>
                                <span class="name">${info.mName || '---'}</span>
                                <span class="class-no">Class: ${info.mClass || '-'}</span>
                            </div>
                            <div class="slot evening">
                                <span class="slot-title">🌙 EVENING</span>
                                <span class="name">${info.eName || '---'}</span>
                                <span class="class-no">Class: ${info.eClass || '-'}</span>
                            </div>
                        </div>
                    </div>
                `;
            });
        } else {
            listContainer.innerHTML = "<p style='text-align:center;'>വിവരങ്ങൾ ലഭ്യമല്ല.</p>";
        }
    });
</script>

</body>
</html>
