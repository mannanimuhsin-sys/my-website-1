<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ഇന്നത്തെ ചായ വിതരണ അറിയിപ്പ്</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    
    <style>
        :root {
            --primary: #1e3c72;
            --morning-gradient: linear-gradient(135deg, #FF9100, #F5AF19);
            --evening-gradient: linear-gradient(135deg, #00B4DB, #0083B0);
            --bg: #f0f4f8;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: var(--bg);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
        }

        .main-card {
            background: white;
            width: 100%;
            max-width: 420px;
            border-radius: 35px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
            overflow: hidden;
            text-align: center;
            border: 1px solid #fff;
        }

        /* മുകളിലെ തീയതി സെക്ഷൻ */
        .date-header {
            background: var(--primary);
            color: white;
            padding: 30px 20px;
        }

        .date-header h1 {
            margin: 0;
            font-size: 3rem;
            font-weight: 900;
        }

        .month-year {
            font-size: 1.2rem;
            opacity: 0.9;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .info-container {
            padding: 25px;
        }

        /* കാർഡ് ബോക്സുകൾ */
        .person-card {
            padding: 20px;
            border-radius: 25px;
            margin-bottom: 25px;
            color: white;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            position: relative;
            transform: scale(1);
            transition: transform 0.3s ease;
        }

        .person-card:active { transform: scale(0.98); }

        .morning-card { background: var(--morning-gradient); }
        .evening-card { background: var(--evening-gradient); }

        .time-label {
            font-size: 0.85rem;
            font-weight: bold;
            background: rgba(255, 255, 255, 0.2);
            padding: 5px 15px;
            border-radius: 20px;
            display: inline-block;
            margin-bottom: 15px;
        }

        .student-name {
            font-size: 1.9rem;
            font-weight: 900;
            margin: 5px 0;
            text-shadow: 1px 1px 5px rgba(0,0,0,0.1);
        }

        .student-class {
            font-size: 1.1rem;
            font-weight: bold;
            opacity: 0.95;
            background: rgba(0,0,0,0.1);
            display: inline-block;
            padding: 2px 15px;
            border-radius: 10px;
            margin-top: 5px;
        }

        .no-data {
            color: #888;
            font-style: italic;
            padding: 40px 0;
        }

        .footer {
            padding-bottom: 20px;
            font-size: 0.8rem;
            color: #aaa;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="main-card">
        <div class="date-header">
            <div class="month-year" id="monthText">---</div>
            <h1 id="dayNum">--</h1>
            <div class="month-year" id="yearText">----</div>
        </div>

        <div class="info-container" id="displayArea">
            <p style="color: #666;">വിവരങ്ങൾ ശേഖരിക്കുന്നു...</p>
        </div>

        <div class="footer">
            മിസ്ബാഹുൽ ഉലൂം മദ്രസ പെരുവണ 
        </div>
    </div>

<script>
    // Firebase Configuration (നിങ്ങൾ നൽകിയ കോഡ്)
    const firebaseConfig = {
        apiKey: "AIzaSyBriz_0zYwQOcwVgd3XTQ0l-0NKBNYaZXQ",
        authDomain: "misbahul-uloom-madrasa-4830c.firebaseapp.com",
        projectId: "misbahul-uloom-madrasa-4830c",
        databaseURL: "https://misbahul-uloom-madrasa-4830c-default-rtdb.firebaseio.com/",
        storageBucket: "misbahul-uloom-madrasa-4830c.firebasestorage.app",
        messagingSenderId: "370558703441",
        appId: "1:370558703441:web:dc68dbdbd685c9d07ea570"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function startDisplay() {
        const area = document.getElementById('displayArea');
        const dayH = document.getElementById('dayNum');
        const monthH = document.getElementById('monthText');
        const yearH = document.getElementById('yearText');

        // ഇന്നത്തെ തിയതിയും വിവരങ്ങളും എടുക്കുന്നു
        const now = new Date();
        const currentDay = now.getDate(); // 1-31 വരെയുള്ള തിയതി
        
        // തീയതി സെക്ഷൻ അപ്ഡേറ്റ് ചെയ്യുന്നു
        dayH.innerText = currentDay;
        monthH.innerText = now.toLocaleString('ml-IN', { month: 'long' }); // മലയാളം മാസം
        yearH.innerText = now.getFullYear();

        // ഫയർബേസിൽ നിന്ന് ഇന്നത്തെ (തിയതി നമ്പർ) വിവരങ്ങൾ എടുക്കുന്നു
        db.ref('teaSchedule/' + currentDay).on('value', (snapshot) => {
            const data = snapshot.val();
            
            if(data) {
                area.innerHTML = `
                    <div class="person-card morning-card">
                        <span class="time-label">☕ രാവിലത്തെ ചായ</span>
                        <div class="student-name">${data.mName}</div>
                        <div class="student-class">ക്ലാസ്: ${data.mClass}</div>
                    </div>

                    <div class="person-card evening-card">
                        <span class="time-label">🍵 വൈകുന്നേരത്തെ ചായ</span>
                        <div class="student-name">${data.eName}</div>
                        <div class="student-class">ക്ലാസ്: ${data.eClass}</div>
                    </div>
                `;
            } else {
                area.innerHTML = `<div class="no-data">ഇന്നത്തെ വിവരങ്ങൾ അഡ്മിൻ പാനലിൽ ചേർത്തിട്ടില്ല.</div>`;
            }
        });
    }

    window.onload = startDisplay;
</script>

</body>
</html>
