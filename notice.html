<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notice Board - Misbahul Uloom</title>
    <link href="https://fonts.googleapis.com/css2?family=Manjari:wght@400;700&family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { 
            background: #f4f7f6; 
            display: flex; 
            justify-content: center; 
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 15px; 
            font-family: 'Poppins', 'Manjari', sans-serif; 
        }
        
        .letterhead-card {
            width: 100%;
            max-width: 700px; 
            background: #ffffff;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1); 
            border-radius: 2px;
            position: relative;
            overflow: hidden;
        }

        /* മുകളിലെ നീല ബാർ */
        .top-accent {
            height: 5px;
            background: #003366;
        }

        .header {
            padding: 40px 40px 20px 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 2px solid #003366;
            margin: 0 40px;
        }

        .logo {
            width: 80px;
            height: 80px;
            margin-right: 20px;
            object-fit: contain;
        }

        .header-text {
            text-align: left;
        }

        .main-title { 
            color: #003366; /* നീല നിറം */
            font-size: 26px; 
            font-weight: 800; 
            margin: 0;
            line-height: 1.2;
            letter-spacing: 0.5px;
        }

        .sub-title { 
            color: #555; 
            font-size: 14px; 
            margin-top: 5px;
            font-weight: 500;
        }

        .reg-no {
            font-size: 12px;
            color: #777;
            margin-top: 2px;
        }

        .notice-container {
            padding: 40px;
            min-height: 300px;
        }

        .notice-label {
            display: inline-block;
            background: #003366;
            color: white;
            padding: 4px 15px;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 1px;
            margin-bottom: 25px;
            text-transform: uppercase;
        }

        #heading { 
            color: #003366; /* നീല നിറം */
            font-size: 22px; 
            font-weight: 700; 
            margin-bottom: 15px; 
            line-height: 1.5;
            font-family: 'Manjari', sans-serif;
        }

        #details { 
            color: #000000; /* ബ്ലാക്ക് ടെക്സ്റ്റ് */
            font-size: 18px; 
            line-height: 1.8; 
            white-space: pre-wrap; 
            font-family: 'Manjari', sans-serif; 
            text-align: justify;
        }
        
        .empty-state {
            color: #999;
            font-style: italic;
            text-align: center !important;
        }

        .footer {
            padding: 20px 40px;
            background: #fafafa;
            border-top: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            color: #888;
            font-size: 12px;
        }

        .btn-home {
            display: block;
            text-align: center;
            margin: 20px auto;
            color: #003366;
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
            transition: 0.3s;
        }

        .btn-home:hover {
            opacity: 0.7;
        }

        @media (max-width: 600px) {
            .header { flex-direction: column; text-align: center; padding: 20px 20px 10px 20px; }
            .logo { margin-right: 0; margin-bottom: 10px; width: 60px; height: 60px; }
            .header-text { text-align: center; }
            .main-title { font-size: 20px; }
            .notice-container { padding: 20px; }
        }
    </style>
</head>
<body>

<div style="width: 100%; max-width: 700px;">
    <div class="letterhead-card">
        <div class="top-accent"></div>
        
        <header class="header">
            <img src="icon-192.png" alt="Logo" class="logo">
            <div class="header-text">
                <h1 class="main-title">MISBAHUL ULOOM MADRASA</h1>
                <div class="sub-title">Peruvana | Under SKIMVB</div>
                <div class="reg-no">Reg. No: 4224</div>
            </div>
        </header>

        <main class="notice-container">
            <div class="notice-label">Notification</div>
            <div id="heading" class="empty-state">Loading...</div>
            <div id="details">അറിയിപ്പുകൾ പരിശോധിക്കുന്നു...</div>
        </main>

        <footer class="footer">
            <span><i class="fas fa-map-marker-alt"></i> Peruvana, Kerala</span>
            <span id="currentDate">Official Digital Notice</span>
        </footer>
    </div>
    
    <a href="index.html" class="btn-home"><i class="fas fa-arrow-left"></i> BACK TO HOME</a>
</div>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAUkOIp33p7sMviItKLEP6EGyPQvFBuQeY",
        authDomain: "result-aedec.firebaseapp.com",
        projectId: "result-aedec",
        storageBucket: "result-aedec.firebasestorage.app",
        messagingSenderId: "654773450983",
        appId: "1:654773450983:web:463a919c5c83ec55134a42"
    };

    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.firestore();

    db.collection("notices").doc("latest").onSnapshot(doc => {
        const headingEl = document.getElementById('heading');
        const detailsEl = document.getElementById('details');
        
        if(doc.exists && doc.data().title && doc.data().title.trim() !== "") {
            headingEl.classList.remove("empty-state");
            headingEl.innerText = doc.data().title;
            detailsEl.innerText = doc.data().message;
        } else {
            headingEl.classList.add("empty-state");
            headingEl.innerText = "പുതിയ അറിയിപ്പുകൾ ലഭ്യമല്ല";
            detailsEl.innerText = "നിലവിൽ പുതിയ അറിയിപ്പുകൾ ഒന്നും തന്നെ ലഭ്യമല്ല. ദയവായി പിന്നീട് പരിശോധിക്കുക.";
        }
    });
</script>
</body>
</html>
